[Settings]
EnableLogging=0

[Compatibility]
ChainloadFolder=mctde-Link_Chainload

[DLLs]
GenericDLL0=
GenericDLL1=
GenericDLL2=
GenericDLL3=
GenericDLL4=
GenericDLL5=
GenericDLL6=
GenericDLL7=
GenericDLL8=
GenericDLL9=

[Render]
; Backend = d3d (in-frame overlay, no stutter; drawn inside d3d9.dll itself --
;   no companion DLL needed) or gdi (old separate-window fallback).
; NOTE: the old mctde_overlay.dll companion is obsolete as of 0.1.3. If one is
;   left over in your ChainloadFolder it is ignored automatically -- you can delete it.
Backend=d3d
; How often (ms) the overlay bitmap is refreshed (16-500). 66 = ~15 Hz.
SubmitMs=66
; --- gdi-backend-only option (ignored when Backend=d3d) ---
; GDI-window repaint interval ms (66 = ~15Hz; lower = smoother but more DWM cost).
RepaintMs=66

[Overlay]
ShowHeader=1
MarkerGutterExtra=8
FontFace=Tahoma
FontHeight=24
HpFontHeight=24
LineHeight=20
Corner=top_left
PaddingX=5
PaddingY=5
RefreshMs=1000
HideLocal=0
ForceTopmost=0

[HP]
Enabled=1
CurrentOffset=724
MaxOffset=728
OneHpLingerMs=500
PollMs=33

[Debug]
DumpOverlayData=0
DebugP2PBridge=0

[WebSocket]
Enabled=0
Port=39876
SendMs=33

[TruePing]
UseHighResTimer=0
PollSleepMs=33
DisplayMode=2
BestWindow=8
Enabled=1
Debug=0
PreferOverlay=1
SendEnabled=1
ReceiveEnabled=1
Channel=63
