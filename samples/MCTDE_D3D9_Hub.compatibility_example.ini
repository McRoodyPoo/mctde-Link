; Optional compatibility settings for mctde-Link.
; Keep your existing overlay/HP/TruePing/WebSocket settings in MCTDE_D3D9_Hub.ini.

[Compatibility]
; mctde-Link loads every DLL in this folder beside DATA.exe.
; d3d9.dll is skipped to avoid recursively loading another d3d9 proxy.
ChainloadFolder=mctde-Link_Chainload

[DLLs]
; Optional explicit DLL loading. Relative paths are resolved beside DATA.exe.
; For PTDE Practice Tool / TAS Runner, either install dinput8.dll normally beside DATA.exe,
; or uncomment this line if you want mctde-Link to LoadLibrary it directly.
; GenericDLL0=.\dinput8.dll
